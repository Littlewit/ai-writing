<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式输出测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .output {
            border: 1px solid #ccc;
            padding: 20px;
            min-height: 300px;
            white-space: pre-wrap;
            background: #f9f9f9;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>流式输出测试</h1>
    <button onclick="testStream()">测试流式接口</button>
    <div id="output" class="output">等待测试...</div>

    <script>
        async function testStream() {
            const output = document.getElementById('output');
            output.textContent = '开始测试...\n';

            const threadId = 'test_' + Date.now();
            const message = '请给我讲一个笑话';

            try {
                const response = await fetch(`/stream/${threadId}?message=${encodeURIComponent(message)}`);

                output.textContent += `状态码: ${response.status}\n`;
                output.textContent += `内容类型: ${response.headers.get('content-type')}\n\n`;

                if (!response.ok) {
                    output.textContent += `错误: HTTP ${response.status}\n`;
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let messageCount = 0;
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    output.textContent += `收到数据块: ${chunk}\n\n`;

                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                output.textContent += `解析的JSON: ${JSON.stringify(data)}\n`;

                                if (data.event === 'message' && data.content) {
                                    messageCount++;
                                    fullContent += data.content;
                                    output.textContent += `\n[消息 ${messageCount}] ${data.content.substring(0, 100)}...\n`;
                                } else if (data.event === 'done') {
                                    output.textContent += `\n完成! 共收到 ${messageCount} 条消息\n`;
                                    output.textContent += `\n完整内容:\n${fullContent}`;
                                } else if (data.event === 'error') {
                                    output.textContent += `\n错误: ${data.error}\n`;
                                }
                            } catch (e) {
                                output.textContent += `JSON解析错误: ${e.message}\n`;
                            }
                        }
                    }
                }

            } catch (error) {
                output.textContent += `请求错误: ${error.message}\n`;
            }
        }
    </script>
</body>
</html>
